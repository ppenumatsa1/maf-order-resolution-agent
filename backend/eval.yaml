name: order-resolution-quality
dataset:
  local_uri: .foundry/datasets/order-resolution-hosted-cases.jsonl
evaluators:
  - relevance
foundry:
  name: order-resolution-foundry-report
  report_only: true
  max_queries: 10
  poll_interval: 5
  timeout: 900
  evaluators:
    - relevance
  optional_groundedness_evaluator: groundedness
options:
  pass_threshold: 0.8
