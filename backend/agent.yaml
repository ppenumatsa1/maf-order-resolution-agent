kind: hosted
name: order-resolution-hosted
protocols:
    - protocol: responses
      version: 2.0.0
code_configuration:
    runtime: python_3_13
    entry_point: foundry/main.py
    dependency_resolution: remote_build
environment_variables:
    - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
      value: "false"
    - name: FOUNDRY_PROJECTS_ENDPOINT
      value: ${FOUNDRY_PROJECTS_ENDPOINT}
    - name: FOUNDRY_MODEL_DEPLOYMENT_NAME
      value: ${FOUNDRY_MODEL_DEPLOYMENT_NAME}
    - name: FOUNDRY_DEPLOYMENT_PROFILE
      value: ${FOUNDRY_DEPLOYMENT_PROFILE}
    - name: DATABASE_URL
      value: ${DATABASE_URL}
    - name: FOUNDRY_RUNTIME_DATABASE_URL
      value: ${FOUNDRY_RUNTIME_DATABASE_URL}
    - name: RUNTIME_DATABASE_URL
      value: ${RUNTIME_DATABASE_URL}
    - name: APP_ENV
      value: ${APP_ENV}
    - name: STORE_PROVIDER
      value: ${STORE_PROVIDER}
    - name: MEMORY_PROVIDER
      value: ${MEMORY_PROVIDER}
    - name: RAG_PROVIDER
      value: ${RAG_PROVIDER}
