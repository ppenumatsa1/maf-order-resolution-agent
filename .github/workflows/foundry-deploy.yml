name: Foundry Deploy (Private)

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Optional self-hosted runner label override
        required: false
        default: ""
      environment:
        description: Optional GitHub environment override
        required: false
        default: ""
      run_smoke:
        description: Run smoke invoke after deploy
        required: false
        default: "true"
      run_e2e:
        description: Run hosted E2E after smoke
        required: false
        default: "false"
      run_eval:
        description: Run report-only Foundry eval after smoke/E2E
        required: false
        default: "true"
      probe_only:
        description: Run lightweight hosted invoke probe only
        required: false
        default: "false"
      probe_message:
        description: Probe message
        required: false
        default: Resolve delayed order ORD-1001
      probe_agent_name:
        description: Hosted agent name
        required: false
        default: order-resolution-hosted
  workflow_call:
    inputs:
      runner_label:
        required: false
        type: string
        default: ""
      environment:
        required: false
        type: string
        default: ""
      run_smoke:
        required: false
        type: string
        default: "true"
      run_e2e:
        required: false
        type: string
        default: "false"
      run_eval:
        required: false
        type: string
        default: "true"
      probe_only:
        required: false
        type: string
        default: "false"
      probe_message:
        required: false
        type: string
        default: Resolve delayed order ORD-1001
      probe_agent_name:
        required: false
        type: string
        default: order-resolution-hosted

permissions:
  id-token: write
  contents: read

concurrency:
  group: foundry-deploy-private
  cancel-in-progress: true

jobs:
  probe:
    if: ${{ (inputs.probe_only || github.event.inputs.probe_only || 'false') == 'true' }}
    runs-on:
      - self-hosted
      - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
    environment: ${{ inputs.environment || github.event.inputs.environment || 'foundry-private-env' }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/setup-azd@v2

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Install Foundry azd extension
        run: azd ext install azure.ai.agents --no-prompt

      - name: Install Foundry connections extension
        run: azd ext install azure.ai.connections --no-prompt

      - name: Select private azd environment
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          azd_env_name="${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}"
          cd infra/foundry-hosted
          azd env select "$azd_env_name" --no-prompt || azd env new "$azd_env_name" --no-prompt

      - name: Invoke probe message
        run: |
          set -euo pipefail
          cd infra/foundry-hosted
          azd ai agent invoke "${{ inputs.probe_agent_name || github.event.inputs.probe_agent_name || 'order-resolution-hosted' }}" "${{ inputs.probe_message || github.event.inputs.probe_message || 'Resolve delayed order ORD-1001' }}" --protocol responses --new-conversation --new-session --no-prompt

  deploy:
    if: ${{ (inputs.probe_only || github.event.inputs.probe_only || 'false') != 'true' }}
    runs-on:
      - self-hosted
      - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
    environment: ${{ inputs.environment || github.event.inputs.environment || 'foundry-private-env' }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/setup-azd@v2

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Install Foundry azd extension
        run: azd ext install azure.ai.agents --no-prompt

      - name: Install Foundry connections extension
        run: azd ext install azure.ai.connections --no-prompt

      - name: Select private azd environment
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          azd_env_name="${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}"
          cd infra/foundry-hosted
          azd env select "$azd_env_name" --no-prompt || azd env new "$azd_env_name" --no-prompt
          azd env set AZURE_SUBSCRIPTION_ID "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          azd env set NETWORK_MODE "private"
          azd env set AZURE_RESOURCE_GROUP "${{ vars.FOUNDRY_RESOURCE_GROUP || '' }}"
          azd env set AZURE_LOCATION "${{ vars.AZURE_LOCATION || 'eastus2' }}"
          azd env set FOUNDRY_LOCATION "${{ vars.FOUNDRY_LOCATION || vars.AZURE_LOCATION || 'eastus2' }}"
          azd env set FOUNDRY_PROJECT_NAME "${{ vars.FOUNDRY_PROJECT_NAME || 'order-resolution' }}"
          azd env set HOSTED_AGENT_NAME "${{ vars.HOSTED_AGENT_NAME || 'order-resolution-hosted' }}"
          azd env set AZURE_AI_PROJECT_ID "${{ vars.AZURE_AI_PROJECT_ID || vars.FOUNDRY_PROJECT_ID || '' }}"
          azd env set FOUNDRY_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID || vars.AZURE_AI_PROJECT_ID || '' }}"
          azd env set FOUNDRY_PROJECT_ENDPOINT "${{ vars.FOUNDRY_PROJECT_ENDPOINT || vars.FOUNDRY_PROJECTS_ENDPOINT || '' }}"
          azd env set FOUNDRY_PROJECTS_ENDPOINT "${{ vars.FOUNDRY_PROJECTS_ENDPOINT || vars.FOUNDRY_PROJECT_ENDPOINT || '' }}"
          azd env set NAME_PREFIX "${{ vars.NAME_PREFIX || 'maffnd' }}"
          azd env set POSTGRES_SERVER_NAME "${{ vars.POSTGRES_SERVER_NAME || 'maffndpg7930' }}"
          azd env set POSTGRES_LOCATION "${{ vars.POSTGRES_LOCATION || 'centralus' }}"
          azd env set FOUNDRY_CHAT_DEPLOYMENT_CAPACITY "${{ vars.FOUNDRY_CHAT_DEPLOYMENT_CAPACITY || '30' }}"
          azd env set FOUNDRY_EMBEDDINGS_DEPLOYMENT_CAPACITY "${{ vars.FOUNDRY_EMBEDDINGS_DEPLOYMENT_CAPACITY || '2' }}"
          if [[ -n "${POSTGRES_ADMIN_PASSWORD:-}" ]]; then
            azd env set POSTGRES_ADMIN_PASSWORD "${POSTGRES_ADMIN_PASSWORD}"
          fi

      - name: Ensure private defaults
        run: ./scripts/foundry/ensure_foundry_azd_defaults.sh

      - name: Sync runtime DB URL from Foundry connection
        run: |
          set -euo pipefail
          cd infra/foundry-hosted
          connection_database_url="$(azd ai connection show orderresolutionruntimesecrets --show-credentials --output json --no-prompt | jq -r '.credentials.database_url // empty')"
          if [[ -n "${connection_database_url}" ]]; then
            azd env set RUNTIME_DATABASE_URL "${connection_database_url}"
            azd env set DATABASE_URL "${connection_database_url}"
          fi

      - name: Validate runtime DB host wiring
        run: |
          set -euo pipefail
          cd infra/foundry-hosted
          postgres_server="$(azd env get-value POSTGRES_SERVER_NAME || true)"
          runtime_database_url="$(azd env get-value RUNTIME_DATABASE_URL || true)"
          runtime_db_host="$(printf "%s" "$runtime_database_url" | sed -E 's#^[a-zA-Z0-9+.-]+://[^@]*@([^:/?]+).*#\1#')"
          expected_host="${postgres_server}.postgres.database.azure.com"
          echo "runtime_db_host=${runtime_db_host:-<empty>}"
          echo "expected_db_host=${expected_host:-<empty>}"
          if [[ -n "${runtime_db_host}" && "${runtime_db_host}" != "${expected_host}" ]]; then
            echo "runtime database host mismatch in azd env"
            exit 1
          fi

      - name: Deploy hosted agent
        run: make foundry-deploy

      - name: Smoke invoke
        if: ${{ (inputs.run_smoke || github.event.inputs.run_smoke || 'true') == 'true' }}
        run: make foundry-smoke

      - name: Hosted E2E
        if: ${{ (inputs.run_e2e || github.event.inputs.run_e2e || 'false') == 'true' }}
        run: ./scripts/github/foundry_hosted_e2e.sh

      - name: Ensure Python venv dependency for eval
        if: ${{ (inputs.run_eval || github.event.inputs.run_eval || 'true') == 'true' }}
        run: |
          set -euo pipefail
          if command -v apt-get >/dev/null 2>&1; then
            if ! python3 -m venv /tmp/foundry-eval-venv-check >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y python3-venv
            fi
            rm -rf /tmp/foundry-eval-venv-check
          fi

      - name: Report-only Foundry eval
        if: ${{ (inputs.run_eval || github.event.inputs.run_eval || 'true') == 'true' }}
        run: make eval-foundry

      - name: Upload Foundry eval report
        if: ${{ (inputs.run_eval || github.event.inputs.run_eval || 'true') == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: foundry-eval-report-private
          path: backend/.foundry/results/foundry-report.json
          if-no-files-found: error
