name: Foundry Provision

on:
    workflow_dispatch:
        inputs:
            runner_label:
                description: Self-hosted runner label for private Foundry access
                required: false
                default: foundry-private
            environment:
                description: GitHub environment name
                required: false
                default: foundry-private-env
    workflow_call:
        inputs:
            runner_label:
                required: false
                type: string
                default: foundry-private
            environment:
                required: false
                type: string
                default: foundry-private-env

permissions:
    id-token: write
    contents: read

jobs:
    provision:
        name: Provision Foundry Infra
        runs-on:
            - self-hosted
            - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
        environment: ${{ inputs.environment || github.event.inputs.environment || 'foundry-private-env' }}
        defaults:
            run:
                shell: bash
        steps:
            - name: Reset self-hosted workspace permissions
              run: |
                  set -euo pipefail
                  workspace="${GITHUB_WORKSPACE:?GITHUB_WORKSPACE is required}"
                  mkdir -p "$workspace"
                  if command -v sudo >/dev/null 2>&1; then
                    sudo chown -R "$(id -u):$(id -g)" "$workspace" || true
                  fi
                  chmod -R u+rwX "$workspace" || true
                  find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true

            - uses: actions/checkout@v4

            - name: Stage hosted agent project from backend
              run: |
                  set -euo pipefail
                  rm -rf infra/foundry-hosted/agent
                  mkdir -p infra/foundry-hosted/agent
                  cp -a backend/. infra/foundry-hosted/agent/
                  rm -rf infra/foundry-hosted/agent/.venv infra/foundry-hosted/agent/tests

            - name: Azure and AZD login
              env:
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
              run: |
                  set -euo pipefail
                  auth_mode="${{ vars.FOUNDRY_DEPLOY_AUTH_MODE || 'service-principal' }}"
                  cfg_root="${RUNNER_TEMP:-/tmp}/foundry-runner"
                  if mkdir -p /mnt/.azure /mnt/.azd 2>/dev/null; then
                    cfg_root="/mnt"
                  fi
                  mkdir -p "${cfg_root}/.azure" "${cfg_root}/.azd"
                  export AZURE_CONFIG_DIR="${cfg_root}/.azure"
                  export AZD_CONFIG_DIR="${cfg_root}/.azd"
                  if [[ "$auth_mode" == "service-principal" ]]; then
                    if [[ -z "${AZURE_CLIENT_SECRET:-}" ]]; then
                      echo "AZURE_CLIENT_SECRET is not set; using GitHub OIDC federated credential flow."
                      if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
                        echo "GitHub OIDC token env vars are missing; cannot authenticate."
                        exit 1
                      fi
                      federated_token="$(curl -fsSL -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')"
                      if [[ -z "$federated_token" || "$federated_token" == "null" ]]; then
                        echo "Failed to acquire GitHub OIDC federated token."
                        exit 1
                      fi
                      az login --service-principal \
                        --username "${{ vars.AZURE_CLIENT_ID }}" \
                        --tenant "${{ vars.AZURE_TENANT_ID }}" \
                        --federated-token "$federated_token"
                      azd auth login \
                        --federated-credential-provider github \
                        --client-id "${{ vars.AZURE_CLIENT_ID }}" \
                        --tenant-id "${{ vars.AZURE_TENANT_ID }}" \
                        --no-prompt
                    else
                      az login --service-principal \
                        --username "${{ vars.AZURE_CLIENT_ID }}" \
                        --password "$AZURE_CLIENT_SECRET" \
                        --tenant "${{ vars.AZURE_TENANT_ID }}"
                      azd auth login \
                        --client-id "${{ vars.AZURE_CLIENT_ID }}" \
                        --client-secret "$AZURE_CLIENT_SECRET" \
                        --tenant-id "${{ vars.AZURE_TENANT_ID }}" \
                        --no-prompt
                    fi
                  else
                    az login --identity --client-id "${{ vars.AZURE_CLIENT_ID }}"
                    azd auth login --managed-identity --client-id "${{ vars.AZURE_CLIENT_ID }}" --tenant-id "${{ vars.AZURE_TENANT_ID }}" --no-prompt
                  fi
                  az account set -s "${{ vars.AZURE_SUBSCRIPTION_ID }}"

            - name: Configure writable azd paths on data disk
              run: |
                  set -euo pipefail
                  cfg_root="${RUNNER_TEMP:-/tmp}/foundry-runner"
                  if mkdir -p /mnt/.home /mnt/.azd /mnt/.tmp /mnt/.azure 2>/dev/null; then
                    cfg_root="/mnt"
                  fi
                  mkdir -p "${cfg_root}/.home" "${cfg_root}/.azd" "${cfg_root}/.tmp" "${cfg_root}/.azure"
                  echo "HOME=${cfg_root}/.home" >> "$GITHUB_ENV"
                  echo "AZD_CONFIG_DIR=${cfg_root}/.azd" >> "$GITHUB_ENV"
                  echo "TMPDIR=${cfg_root}/.tmp" >> "$GITHUB_ENV"
                  echo "AZURE_CONFIG_DIR=${cfg_root}/.azure" >> "$GITHUB_ENV"

            - name: Verify azd availability
              run: azd version

            - name: Install required azd extension
              run: |
                  set -euo pipefail
                  installed_version="$(azd extension show azure.ai.agents | awk -F': ' '/Installed Version/{print $2}' | tr -d '\r')"
                  if [[ -n "$installed_version" && "$installed_version" != "N/A" ]]; then
                    azd extension upgrade azure.ai.agents --no-prompt || true
                  else
                    azd extension install azure.ai.agents --no-prompt
                  fi

            - name: Select or create azd environment
              run: |
                  set -euo pipefail
                  cd infra/foundry-hosted
                  azd env select "${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}" || azd env new "${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}"
                  azd env set AZURE_SUBSCRIPTION_ID "${{ vars.AZURE_SUBSCRIPTION_ID }}"
                  azd env set AZURE_RESOURCE_GROUP "${{ vars.FOUNDRY_RESOURCE_GROUP }}"
                  azd env set AZURE_LOCATION "${{ vars.FOUNDRY_LOCATION || 'eastus2' }}"
                  azd env set NETWORK_MODE "private"
                  azd env set AI_SEARCH_LOCATION "${{ vars.FOUNDRY_AI_SEARCH_LOCATION || 'eastus' }}"
                  azd env set FOUNDRY_PROJECT_NAME "${{ vars.FOUNDRY_PROJECT_NAME || 'order-resolution' }}"
                  azd env set HOSTED_AGENT_NAME "${{ vars.FOUNDRY_HOSTED_AGENT_NAME || 'order-resolution-hosted' }}"
                  azd env set CREATE_PRIVATE_DNS_VNET_LINKS "true"
                  azd env set CREATE_PRIVATE_ENDPOINTS "true"
                  azd env set CREATE_NAT_GATEWAY "true"
                  azd env set CREATE_PRIVATE_RUNNER_ACCESS "true"
                  azd env set CREATE_BASTION_HOST "true"
                  azd env set CREATE_RUNNER_VM "false"
                  azd env set ENABLE_STANDARD_AGENT_NETWORK_INJECTION "true"
                  # Keep primary infra in East US 2 while allowing Search regional fallback for capacity.
                  azd env set aiSearchLocation "${{ vars.FOUNDRY_AI_SEARCH_LOCATION || 'eastus' }}"
                  azd env set foundryProjectName "${{ vars.FOUNDRY_PROJECT_NAME || 'order-resolution' }}"
                  azd env set hostedAgentName "${{ vars.FOUNDRY_HOSTED_AGENT_NAME || 'order-resolution-hosted' }}"
                  azd env set AZURE_AI_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID }}"
                  azd env set FOUNDRY_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID }}"
                  azd env set FOUNDRY_PROJECT_ENDPOINT "${{ vars.FOUNDRY_PROJECT_ENDPOINT }}"
                  # Preserve runner and bastion subnets on shared VNet during incremental provision.
                  azd env set createPrivateRunnerAccess "true"
                  azd env set createRunnerVm "false"
                  if [[ -n "${{ secrets.POSTGRES_ADMIN_PASSWORD || '' }}" ]]; then
                    azd env set POSTGRES_ADMIN_PASSWORD "${{ secrets.POSTGRES_ADMIN_PASSWORD }}"
                  else
                    generated_pg_password="$(openssl rand -base64 36 | tr -d '\n' | tr '/+' 'Aa' | cut -c1-32)"
                    azd env set POSTGRES_ADMIN_PASSWORD "$generated_pg_password"
                  fi
                  runtime_db_url="${{ secrets.FOUNDRY_DATABASE_URL || '' }}"
                  if [[ -z "$runtime_db_url" ]]; then
                    runtime_db_url="$(azd env get-value DATABASE_URL 2>/dev/null || true)"
                  fi
                  if [[ -z "$runtime_db_url" ]]; then
                    runtime_db_url="$(azd env get-value RUNTIME_DATABASE_URL 2>/dev/null || true)"
                  fi
                  if [[ -z "$runtime_db_url" ]]; then
                    echo "Missing runtime database URL. Set secret FOUNDRY_DATABASE_URL in the GitHub environment."
                    exit 1
                  fi
                  runtime_db_host="$(printf '%s' "$runtime_db_url" | sed -E 's#^[a-zA-Z0-9+.-]+://([^@/]+@)?([^:/?]+).*$#\2#')"
                  if [[ "$runtime_db_host" =~ ^(localhost|127\.0\.0\.1)$ ]]; then
                    echo "Invalid runtime database URL host ($runtime_db_host). Foundry hosted runtime cannot use loopback."
                    echo "Update GitHub environment secret FOUNDRY_DATABASE_URL with an Azure PostgreSQL host URL."
                    exit 1
                  fi
                  if [[ "$runtime_db_url" != *"sslmode=require"* ]]; then
                    echo "Runtime database URL must include sslmode=require for Azure PostgreSQL."
                    exit 1
                  fi
                  azd env set RUNTIME_DATABASE_URL "$runtime_db_url"
                  azd env set APP_ENV "${{ vars.APP_ENV || 'foundry-private-env' }}"
                  azd env set STORE_PROVIDER "${{ vars.STORE_PROVIDER || 'postgres' }}"
                  azd env set MEMORY_PROVIDER "${{ vars.MEMORY_PROVIDER || 'postgres' }}"
                  azd env set RAG_PROVIDER "${{ vars.RAG_PROVIDER || 'pgvector' }}"
                  azd env set ENABLE_TELEMETRY "${{ vars.ENABLE_TELEMETRY || 'true' }}"
                  azd env set ENABLE_INSTRUMENTATION "${{ vars.ENABLE_INSTRUMENTATION || 'true' }}"
                  azd env set OTEL_SERVICE_NAME "${{ vars.OTEL_SERVICE_NAME || 'maf-order-resolution-foundry-hosted' }}"
                  azd env set OTEL_RECORD_CONTENT "${{ vars.OTEL_RECORD_CONTENT || 'false' }}"
                  azd env set AZURE_EXPERIMENTAL_ENABLE_GENAI_TRACING "${{ vars.AZURE_EXPERIMENTAL_ENABLE_GENAI_TRACING || 'true' }}"
                  azd env set AZURE_TRACING_GEN_AI_CONTENT_RECORDING_ENABLED "${{ vars.AZURE_TRACING_GEN_AI_CONTENT_RECORDING_ENABLED || 'false' }}"
                  azd env set FOUNDRY_PROJECTS_ENDPOINT "${{ vars.FOUNDRY_PROJECTS_ENDPOINT || '' }}"
                  azd env set FOUNDRY_MODEL_DEPLOYMENT_NAME "${{ vars.FOUNDRY_MODEL_DEPLOYMENT_NAME || '' }}"

            - name: Report Search region topology
              run: |
                  set -euo pipefail
                  foundry_location="${{ vars.FOUNDRY_LOCATION || 'eastus2' }}"
                  search_location="${{ vars.FOUNDRY_AI_SEARCH_LOCATION || 'eastus' }}"
                  if [[ "${foundry_location,,}" != "${search_location,,}" ]]; then
                    warning="AI Search location (${search_location}) differs from Foundry deployment location (${foundry_location}); this is a cross-region data path."
                    echo "WARNING: ${warning}"
                    {
                      echo "### Search region topology warning"
                      echo
                      echo "- ${warning}"
                      echo "- Review latency and data residency requirements for this environment."
                    } >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "AI Search and Foundry deployment locations are aligned at ${foundry_location}."
                  fi

            - name: Provision infrastructure
              run: make foundry-provision
