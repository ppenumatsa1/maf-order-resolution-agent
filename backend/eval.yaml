name: order-resolution-quality
dataset:
  local_uri: .foundry/datasets/order-resolution-hosted-cases.jsonl
agent:
  name: order-resolution-hosted
evaluators:
  - task_completion
  - task_adherence
  - intent_resolution
  - relevance
foundry:
  name: order-resolution-foundry-report
  report_only: true
  max_queries: 10
  poll_interval: 5
  timeout: 900
  evaluators:
    - task_completion
    - task_adherence
    - intent_resolution
    - relevance
  optional_groundedness_evaluator: groundedness
  optional_tool_evaluators:
    - tool_call_accuracy
    - tool_selection
    - tool_input_accuracy
    - tool_output_utilization
    - tool_call_success
options:
  pass_threshold: 0.8
