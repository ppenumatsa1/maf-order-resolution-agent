name: Foundry Provision

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Self-hosted runner label for private Foundry access
        required: false
        default: foundry-private
      environment:
        description: GitHub environment name
        required: false
        default: foundry-private-env
  workflow_call:
    inputs:
      runner_label:
        required: false
        type: string
        default: foundry-private
      environment:
        required: false
        type: string
        default: foundry-private-env

permissions:
  contents: read

jobs:
  provision:
    name: Provision Foundry Infra
    runs-on:
      - self-hosted
      - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
    environment: ${{ inputs.environment || github.event.inputs.environment || 'foundry-private-env' }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Azure login via VM managed identity
        run: |
          set -euo pipefail
          mkdir -p /mnt/.azure
          export AZURE_CONFIG_DIR=/mnt/.azure
          az login --identity --client-id "${{ vars.AZURE_CLIENT_ID }}"
          az account set -s "${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Configure writable azd paths on data disk
        run: |
          set -euo pipefail
          mkdir -p /mnt/.home /mnt/.azd /mnt/.tmp /mnt/.azure
          echo "HOME=/mnt/.home" >> "$GITHUB_ENV"
          echo "AZD_CONFIG_DIR=/mnt/.azd" >> "$GITHUB_ENV"
          echo "TMPDIR=/mnt/.tmp" >> "$GITHUB_ENV"
          echo "AZURE_CONFIG_DIR=/mnt/.azure" >> "$GITHUB_ENV"

      - name: Verify azd availability
        run: azd version

      - name: Prepare runtime env file for Foundry
        run: |
          set -euo pipefail
          mkdir -p infra/foundry-hosted/runtime
          printf '%s\n' "${{ secrets.FOUNDRY_RUNTIME_ENV }}" > infra/foundry-hosted/runtime/.env
          test -s infra/foundry-hosted/runtime/.env

      - name: Select or create azd environment
        run: |
          set -euo pipefail
          cd infra/foundry-hosted
          azd env select "${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}" || azd env new "${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}"
          azd env set AZURE_RESOURCE_GROUP "${{ vars.FOUNDRY_RESOURCE_GROUP }}"
          azd env set AZURE_LOCATION "${{ vars.FOUNDRY_LOCATION || 'centralus' }}"
          azd env set AZURE_AI_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID }}"
          azd env set FOUNDRY_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID }}"
          azd env set FOUNDRY_PROJECT_ENDPOINT "${{ vars.FOUNDRY_PROJECT_ENDPOINT }}"

      - name: Sync env into azd and runtime mirrors
        run: make foundry-sync-env

      - name: Provision infrastructure
        run: make foundry-provision