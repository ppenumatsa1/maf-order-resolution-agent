kind: hosted
name: order-resolution-hosted
protocols:
    - protocol: responses
      version: 2.0.0
code_configuration:
    runtime: python_3_13
    entry_point: foundry/main.py
    dependency_resolution: remote_build
environment_variables:
    - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
      value: "false"
    - name: FOUNDRY_PROJECTS_ENDPOINT
      value: ${FOUNDRY_PROJECTS_ENDPOINT}
    - name: FOUNDRY_MODEL_DEPLOYMENT_NAME
      value: ${FOUNDRY_MODEL_DEPLOYMENT_NAME}
    - name: DATABASE_URL
      value: ${DATABASE_URL}
    - name: FOUNDRY_RUNTIME_DATABASE_URL
      value: ${{connections.orderresolutionruntimesecrets.credentials.keys.database_url}}
    - name: RUNTIME_DATABASE_URL
      value: ${{connections.orderresolutionruntimesecrets.credentials.keys.database_url}}
    - name: APP_ENV
      value: ${APP_ENV}
    - name: STORE_PROVIDER
      value: ${STORE_PROVIDER}
    - name: MEMORY_PROVIDER
      value: ${MEMORY_PROVIDER}
    - name: RAG_PROVIDER
      value: ${RAG_PROVIDER}
    - name: ENABLE_TELEMETRY
      value: ${ENABLE_TELEMETRY}
    - name: ENABLE_INSTRUMENTATION
      value: ${ENABLE_INSTRUMENTATION}
    - name: OTEL_SERVICE_NAME
      value: ${OTEL_SERVICE_NAME}
    - name: OTEL_SERVICE_NAMESPACE
      value: ${OTEL_SERVICE_NAMESPACE}
    - name: OTEL_RECORD_CONTENT
      value: ${OTEL_RECORD_CONTENT}
    - name: APPLICATIONINSIGHTS_CONNECTION_STRING
      value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
    - name: APPINSIGHTS_CONNECTION_STRING
      value: ${APPINSIGHTS_CONNECTION_STRING}
    - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      value: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}
