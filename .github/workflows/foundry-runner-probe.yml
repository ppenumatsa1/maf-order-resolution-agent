name: Foundry Runner Probe (Private)

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Optional self-hosted runner label override
        required: false
        default: ""
      environment:
        description: Optional GitHub environment override
        required: false
        default: ""
      probe_message:
        description: Message sent to hosted responses endpoint
        required: false
        default: Resolve delayed order ORD-1001
      agent_name:
        description: Hosted agent name
        required: false
        default: order-resolution-hosted

permissions:
  id-token: write
  contents: read

jobs:
  probe:
    uses: ./.github/workflows/foundry-deploy.yml
    with:
      runner_label: ${{ github.event.inputs.runner_label || '' }}
      environment: ${{ github.event.inputs.environment || '' }}
      probe_only: "true"
      probe_message: ${{ github.event.inputs.probe_message || 'Resolve delayed order ORD-1001' }}
      probe_agent_name: ${{ github.event.inputs.agent_name || 'order-resolution-hosted' }}
    secrets: inherit
