# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: maf-order-resolution-agent
metadata:
    template: azd-init
services:
    order-resolution-hosted:
        project: ./backend
        host: azure.ai.agent
        language: python
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
infra:
    provider: bicep
    path: ./infra/foundry-hosted/iac
