name: Foundry Orchestrator (Private)

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Optional self-hosted runner label override
        required: false
        default: ""
      environment:
        description: Optional GitHub environment override
        required: false
        default: ""
      run_provision:
        description: Run infrastructure provisioning first
        required: false
        default: "true"
      run_deploy:
        description: Run hosted agent deploy
        required: false
        default: "true"
      run_smoke:
        description: Run smoke validation after deploy
        required: false
        default: "true"
      run_e2e:
        description: Run hosted E2E validation after deploy
        required: false
        default: "false"
      run_eval:
        description: Run report-only Foundry eval after deploy
        required: false
        default: "true"

permissions:
  id-token: write
  contents: read

concurrency:
  group: foundry-orchestrator-private-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provision:
    if: ${{ github.event.inputs.run_provision != 'false' }}
    uses: ./.github/workflows/foundry-provision.yml
    with:
      runner_label: ${{ github.event.inputs.runner_label || '' }}
      environment: ${{ github.event.inputs.environment || '' }}
    secrets: inherit

  deploy_after_provision:
    if: ${{ github.event.inputs.run_deploy != 'false' && github.event.inputs.run_provision != 'false' }}
    needs: [provision]
    uses: ./.github/workflows/foundry-deploy.yml
    with:
      runner_label: ${{ github.event.inputs.runner_label || '' }}
      environment: ${{ github.event.inputs.environment || '' }}
      run_smoke: ${{ github.event.inputs.run_smoke || 'true' }}
      run_e2e: ${{ github.event.inputs.run_e2e || 'false' }}
      run_eval: ${{ github.event.inputs.run_eval || 'true' }}
    secrets: inherit

  deploy_only:
    if: ${{ github.event.inputs.run_deploy != 'false' && github.event.inputs.run_provision == 'false' }}
    uses: ./.github/workflows/foundry-deploy.yml
    with:
      runner_label: ${{ github.event.inputs.runner_label || '' }}
      environment: ${{ github.event.inputs.environment || '' }}
      run_smoke: ${{ github.event.inputs.run_smoke || 'true' }}
      run_e2e: ${{ github.event.inputs.run_e2e || 'false' }}
      run_eval: ${{ github.event.inputs.run_eval || 'true' }}
    secrets: inherit
