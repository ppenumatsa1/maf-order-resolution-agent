# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: maf-order-resolution-agent
metadata:
    template: azd-init
services:
    backend:
        project: ./backend
        host: containerapp
        language: python
        docker:
            path: Dockerfile
            context: .
    frontend:
        project: ./frontend
        host: containerapp
        language: js
        docker:
            path: Dockerfile
            context: .
    order-resolution-hosted:
        project: ./backend/foundry
        host: azure.ai.agent
        language: python
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
infra:
    provider: bicep
    path: ./infra/azure-apphosted/iac
