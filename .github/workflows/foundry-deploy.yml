name: Foundry Deploy

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Self-hosted runner label for private Foundry access
        required: false
        default: foundry-private
      environment:
        description: GitHub environment name
        required: false
        default: foundry-private-env
      run_smoke:
        description: Run Foundry smoke invoke after deploy
        required: false
        default: "true"
      run_telemetry_gate:
        description: Validate fresh App Insights telemetry after deploy
        required: false
        default: "true"
  workflow_call:
    inputs:
      runner_label:
        required: false
        type: string
        default: foundry-private
      environment:
        required: false
        type: string
        default: foundry-private-env
      run_smoke:
        required: false
        type: string
        default: "true"
      run_telemetry_gate:
        required: false
        type: string
        default: "true"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Foundry Hosted Agent
    runs-on:
      - self-hosted
      - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
    environment: ${{ inputs.environment || github.event.inputs.environment || 'foundry-private-env' }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/setup-azd@v2

      - name: Prepare runtime env file for Foundry
        run: |
          set -euo pipefail
          mkdir -p infra/foundry-hosted/runtime
          printf '%s\n' "${{ secrets.FOUNDRY_RUNTIME_ENV }}" > infra/foundry-hosted/runtime/.env
          test -s infra/foundry-hosted/runtime/.env

      - name: Select or create azd environment
        run: |
          set -euo pipefail
          cd infra/foundry-hosted
          azd env select "${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}" || azd env new "${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}"
          azd env set AZURE_RESOURCE_GROUP "${{ vars.FOUNDRY_RESOURCE_GROUP }}"
          azd env set AZURE_LOCATION "${{ vars.FOUNDRY_LOCATION || 'centralus' }}"
          azd env set AZURE_AI_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID }}"
          azd env set FOUNDRY_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID }}"
          azd env set FOUNDRY_PROJECT_ENDPOINT "${{ vars.FOUNDRY_PROJECT_ENDPOINT }}"

      - name: Sync env into azd and runtime mirrors
        run: make foundry-sync-env

      - name: Deploy Foundry hosted agent
        run: make foundry-deploy

      - name: Smoke test Foundry hosted agent invoke
        if: ${{ (inputs.run_smoke || github.event.inputs.run_smoke || 'true') == 'true' }}
        run: make foundry-smoke

      - name: Telemetry gate (App Insights)
        if: ${{ (inputs.run_telemetry_gate || github.event.inputs.run_telemetry_gate || 'true') == 'true' }}
        run: |
          set -euo pipefail
          APP_ID="${{ vars.APPINSIGHTS_APP_ID }}"
          if [[ -z "$APP_ID" ]]; then
            echo "APPINSIGHTS_APP_ID variable is required for telemetry gate"
            exit 1
          fi

          # Wait up to 10 minutes for ingestion after deploy+invoke
          for i in $(seq 1 20); do
            COUNT=$(az monitor app-insights query --app "$APP_ID" \
              --analytics-query "union traces,requests,dependencies,exceptions | where timestamp > ago(15m) | summarize count()" \
              --query "tables[0].rows[0][0]" -o tsv)
            COUNT=${COUNT:-0}
            echo "telemetry_count=$COUNT (attempt $i/20)"
            if [[ "$COUNT" =~ ^[0-9]+$ ]] && [[ "$COUNT" -gt 0 ]]; then
              echo "Telemetry gate passed"
              exit 0
            fi
            sleep 30
          done

          echo "Telemetry gate failed: no fresh App Insights data in the expected window"
          exit 1