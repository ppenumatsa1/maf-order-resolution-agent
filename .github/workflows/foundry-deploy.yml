name: Foundry Deploy

on:
  workflow_dispatch:
    inputs:
      deployment_profile:
        description: Deployment profile
        required: false
        type: choice
        options:
          - private
          - public
        default: private
      runner_label:
        description: Optional self-hosted runner label override
        required: false
        default: ""
      environment:
        description: Optional GitHub environment override
        required: false
        default: ""
      run_smoke:
        description: Run smoke invoke after deploy
        required: false
        default: "true"
      run_e2e:
        description: Run hosted E2E script after deploy
        required: false
        default: "false"
      probe_only:
        description: Run a lightweight invoke probe only
        required: false
        default: "false"
      probe_message:
        description: Probe message
        required: false
        default: Resolve delayed order ORD-1001
      probe_agent_name:
        description: Hosted agent name
        required: false
        default: order-resolution-hosted
  workflow_call:
    inputs:
      deployment_profile:
        required: false
        type: string
        default: private
      runner_label:
        required: false
        type: string
        default: ""
      environment:
        required: false
        type: string
        default: ""
      run_smoke:
        required: false
        type: string
        default: "true"
      run_e2e:
        required: false
        type: string
        default: "false"
      probe_only:
        required: false
        type: string
        default: "false"
      probe_message:
        required: false
        type: string
        default: Resolve delayed order ORD-1001
      probe_agent_name:
        required: false
        type: string
        default: order-resolution-hosted

permissions:
  id-token: write
  contents: read

concurrency:
  group: foundry-deploy-${{ inputs.deployment_profile || github.event.inputs.deployment_profile || 'private' }}
  cancel-in-progress: true

jobs:
  probe:
    name: Probe hosted agent
    if: ${{ (inputs.probe_only || github.event.inputs.probe_only || 'false') == 'true' }}
    runs-on:
      - self-hosted
      - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || (((inputs.deployment_profile || github.event.inputs.deployment_profile || 'private') == 'public') && 'foundry-public' || 'foundry-private') }}
    environment: ${{ inputs.environment || github.event.inputs.environment || (((inputs.deployment_profile || github.event.inputs.deployment_profile || 'private') == 'public') && 'foundry-public-env' || 'foundry-private-env') }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Repair runner workspace permissions
        run: |
          set -euo pipefail
          if ! command -v sudo >/dev/null 2>&1; then
            exit 0
          fi
          if [[ -d "${GITHUB_WORKSPACE}" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" || true
            sudo rm -rf "${GITHUB_WORKSPACE}/infra/foundry-hosted/None" || true
          fi

      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/setup-azd@v2

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Install Foundry azd extension
        run: azd ext install azure.ai.agents --no-prompt

      - name: Select azd environment
        run: |
          set -euo pipefail
          profile="${{ inputs.deployment_profile || github.event.inputs.deployment_profile || 'private' }}"
          if [[ "$profile" == "public" ]]; then
            azd_env_name="${{ vars.FOUNDRY_PUBLIC_AZD_ENV_NAME || 'foundry-public-dev2' }}"
          else
            azd_env_name="${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}"
          fi
          cd infra/foundry-hosted
          azd env select "$azd_env_name" --no-prompt || azd env new "$azd_env_name" --no-prompt

      - name: Invoke probe message
        run: |
          set -euo pipefail
          cd infra/foundry-hosted
          azd ai agent invoke "${{ inputs.probe_agent_name || github.event.inputs.probe_agent_name || 'order-resolution-hosted' }}" "${{ inputs.probe_message || github.event.inputs.probe_message || 'Resolve delayed order ORD-1001' }}" --protocol responses --new-conversation --new-session --no-prompt

  deploy:
    name: Deploy Foundry hosted agent
    if: ${{ (inputs.probe_only || github.event.inputs.probe_only || 'false') != 'true' }}
    runs-on:
      - self-hosted
      - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || (((inputs.deployment_profile || github.event.inputs.deployment_profile || 'private') == 'public') && 'foundry-public' || 'foundry-private') }}
    environment: ${{ inputs.environment || github.event.inputs.environment || (((inputs.deployment_profile || github.event.inputs.deployment_profile || 'private') == 'public') && 'foundry-public-env' || 'foundry-private-env') }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Repair runner workspace permissions
        run: |
          set -euo pipefail
          if ! command -v sudo >/dev/null 2>&1; then
            exit 0
          fi
          if [[ -d "${GITHUB_WORKSPACE}" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" || true
            sudo rm -rf "${GITHUB_WORKSPACE}/infra/foundry-hosted/None" || true
          fi

      - uses: actions/checkout@v4

      - name: Validate hosted source path
        run: |
          set -euo pipefail
          test -f backend/agent.yaml
          test -f backend/foundry/main.py

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/setup-azd@v2

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Install Foundry azd extension
        run: azd ext install azure.ai.agents --no-prompt

      - name: Select and configure azd environment
        run: |
          set -euo pipefail
          profile="${{ inputs.deployment_profile || github.event.inputs.deployment_profile || 'private' }}"
          if [[ "$profile" == "public" ]]; then
            azd_env_name="${{ vars.FOUNDRY_PUBLIC_AZD_ENV_NAME || 'foundry-public-dev2' }}"
            resource_group="${{ vars.FOUNDRY_PUBLIC_RESOURCE_GROUP || vars.FOUNDRY_RESOURCE_GROUP || 'rg-maf-ora-foundry-public-dev2' }}"
            network_mode="public"
            create_private_dns_vnet_links="false"
            create_private_endpoints="false"
            create_nat_gateway="false"
            create_private_runner_access="false"
            create_bastion_host="false"
            create_runner_vm="false"
            enable_standard_agent_network_injection="false"
            create_account_capability_host="false"
            create_project_capability_host="false"
            assign_pre_caphost_rbac="false"
            assign_post_caphost_rbac="false"
            manage_project_connections="true"
          else
            azd_env_name="${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}"
            resource_group="${{ vars.FOUNDRY_RESOURCE_GROUP || 'rg-maf-ora-foundry' }}"
            network_mode="private"
            create_private_dns_vnet_links="true"
            create_private_endpoints="true"
            create_nat_gateway="true"
            create_private_runner_access="false"
            create_bastion_host="true"
            create_runner_vm="true"
            enable_standard_agent_network_injection="true"
            create_account_capability_host="false"
            create_project_capability_host="true"
            assign_pre_caphost_rbac="true"
            assign_post_caphost_rbac="true"
            manage_project_connections="false"
          fi

          cd infra/foundry-hosted
          azd env select "$azd_env_name" --no-prompt || azd env new "$azd_env_name" --no-prompt
          azd env set AZURE_SUBSCRIPTION_ID "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          azd env set AZURE_RESOURCE_GROUP "$resource_group"
          azd env set AZURE_LOCATION "${{ vars.FOUNDRY_LOCATION || 'eastus2' }}"
          azd env set NETWORK_MODE "$network_mode"
          azd env set CREATE_PRIVATE_DNS_VNET_LINKS "$create_private_dns_vnet_links"
          azd env set CREATE_PRIVATE_ENDPOINTS "$create_private_endpoints"
          azd env set CREATE_NAT_GATEWAY "$create_nat_gateway"
          azd env set CREATE_PRIVATE_RUNNER_ACCESS "$create_private_runner_access"
          azd env set CREATE_BASTION_HOST "$create_bastion_host"
          azd env set CREATE_RUNNER_VM "$create_runner_vm"
          azd env set ENABLE_STANDARD_AGENT_NETWORK_INJECTION "$enable_standard_agent_network_injection"
          azd env set FOUNDRY_DEPLOYMENT_PROFILE "$profile"
          azd env set CREATE_ACCOUNT_CAPABILITY_HOST "$create_account_capability_host"
          azd env set CREATE_PROJECT_CAPABILITY_HOST "$create_project_capability_host"
          azd env set ASSIGN_PRE_CAPHOST_RBAC "$assign_pre_caphost_rbac"
          azd env set ASSIGN_POST_CAPHOST_RBAC "$assign_post_caphost_rbac"
          azd env set MANAGE_PROJECT_CONNECTIONS "$manage_project_connections"
          azd env set CREATE_POSTGRES_SERVER "true"
          azd env set POSTGRES_SERVER_NAME "${{ vars.POSTGRES_SERVER_NAME || 'maffndpg7930' }}"
          azd env set POSTGRES_ADMIN_USERNAME "${{ vars.POSTGRES_ADMIN_USERNAME || 'pgadmin' }}"
          azd env set POSTGRES_DATABASE_NAME "${{ vars.POSTGRES_DATABASE_NAME || 'maf_workflow' }}"
          azd env set POSTGRES_LOCATION "${{ vars.POSTGRES_LOCATION || 'centralus' }}"

          project_id="${{ vars.FOUNDRY_PROJECT_ID || '' }}"
          project_endpoint="${{ vars.FOUNDRY_PROJECT_ENDPOINT || vars.FOUNDRY_PROJECTS_ENDPOINT || '' }}"
          project_name="${{ vars.FOUNDRY_PROJECT_NAME || 'order-resolution' }}"
          account_name=""
          if [[ -z "$project_id" || -z "$project_endpoint" ]]; then
            account_name="$(az cognitiveservices account list --resource-group "$resource_group" --query "[0].name" -o tsv)"
            if [[ -z "$account_name" ]]; then
              echo "Unable to resolve Foundry account name in resource group $resource_group"
              exit 1
            fi
          fi
          if [[ -z "$project_id" ]]; then
            project_id="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/$resource_group/providers/Microsoft.CognitiveServices/accounts/$account_name/projects/$project_name"
          fi
          if [[ -z "$project_endpoint" ]]; then
            project_endpoint="https://$account_name.services.ai.azure.com/api/projects/$project_name"
          fi
          azd env set AZURE_AI_PROJECT_ID "$project_id"
          azd env set FOUNDRY_PROJECT_ID "$project_id"
          azd env set AZURE_AI_PROJECT_ENDPOINT "$project_endpoint"
          azd env set FOUNDRY_PROJECTS_ENDPOINT "$project_endpoint"
          azd env set FOUNDRY_PROJECT_ENDPOINT "$project_endpoint"
          azd env set FOUNDRY_MODEL_DEPLOYMENT_NAME "${{ vars.FOUNDRY_MODEL_DEPLOYMENT_NAME || 'gpt-4o-mini' }}"
          if [[ -z "$account_name" ]]; then
            account_name="$(echo "$project_endpoint" | sed -E 's#https://([^.]+)\..*#\1#')"
          fi
          echo "FOUNDRY_ACCOUNT_NAME=$account_name" >> "$GITHUB_ENV"
          echo "FOUNDRY_RESOURCE_GROUP=$resource_group" >> "$GITHUB_ENV"

          runtime_db_url="${{ secrets.FOUNDRY_DATABASE_URL || '' }}"
          if [[ -n "$runtime_db_url" ]]; then
            runtime_db_url="$(echo "$runtime_db_url" | tr -d '[:space:]')"
          fi
          if [[ "$runtime_db_url" == *"******"* || "$runtime_db_url" == *"localhost"* || "$runtime_db_url" == *"127.0.0.1"* ]]; then
            runtime_db_url=""
          fi

          postgres_password="${{ secrets.POSTGRES_ADMIN_PASSWORD || '' }}"
          postgres_server_name="$(azd env get-value POSTGRES_SERVER_NAME | tr -d '\"[:space:]')"
          postgres_admin_username="$(azd env get-value POSTGRES_ADMIN_USERNAME | tr -d '\"[:space:]')"
          postgres_database_name="$(azd env get-value POSTGRES_DATABASE_NAME | tr -d '\"[:space:]')"
          if [[ -n "$postgres_password" ]]; then
            azd env set POSTGRES_ADMIN_PASSWORD "$postgres_password"
          fi
          if [[ -z "$runtime_db_url" && -n "$postgres_password" ]]; then
            postgres_fqdn="$(az postgres flexible-server show --resource-group "$resource_group" --name "$postgres_server_name" --query "fullyQualifiedDomainName" -o tsv)"
            if [[ -z "$postgres_fqdn" ]]; then
              echo "Unable to resolve PostgreSQL server '$postgres_server_name' in resource group $resource_group"
              exit 1
            fi
            encoded_password="$(python -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$postgres_password")"
            runtime_db_url="postgresql://${postgres_admin_username}:${encoded_password}@${postgres_fqdn}:5432/${postgres_database_name}?sslmode=require"
          fi

          if [[ -z "$runtime_db_url" ]]; then
            echo "Runtime database URL is not set. Configure FOUNDRY_DATABASE_URL or POSTGRES_ADMIN_PASSWORD in this GitHub environment."
            exit 1
          fi

          azd env set FOUNDRY_RUNTIME_DATABASE_URL "$runtime_db_url"
          azd env set DATABASE_URL "$runtime_db_url"
          azd env set RUNTIME_DATABASE_URL "$runtime_db_url"
          app_env="foundry-${profile}-env"
          azd env set APP_ENV "$app_env"
          azd env set STORE_PROVIDER "postgres"
          azd env set MEMORY_PROVIDER "postgres"
          azd env set RAG_PROVIDER "pgvector"

          enable_telemetry="${{ vars.ENABLE_TELEMETRY || 'true' }}"
          enable_instrumentation="${{ vars.ENABLE_INSTRUMENTATION || 'true' }}"
          otel_record_content="${{ vars.OTEL_RECORD_CONTENT || 'false' }}"
          otel_service_namespace="${{ vars.OTEL_SERVICE_NAMESPACE || 'maf-order-resolution' }}"
          otel_service_name="${{ vars.OTEL_SERVICE_NAME || '' }}"
          if [[ -z "$otel_service_name" ]]; then
            otel_service_name="maf-order-resolution-foundry-${profile}"
          fi
          otlp_traces_endpoint="${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT || '' }}"
          appinsights_connection_string="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING || vars.APPLICATIONINSIGHTS_CONNECTION_STRING || '' }}"
          if [[ -z "$appinsights_connection_string" ]]; then
            appi_name="$(az resource list --resource-group "$resource_group" --resource-type Microsoft.Insights/components --query "[0].name" -o tsv)"
            if [[ -n "$appi_name" ]]; then
              appinsights_connection_string="$(az resource show --resource-group "$resource_group" --name "$appi_name" --resource-type Microsoft.Insights/components --query properties.ConnectionString -o tsv)"
            fi
          fi

          azd env set ENABLE_TELEMETRY "$enable_telemetry"
          azd env set ENABLE_INSTRUMENTATION "$enable_instrumentation"
          azd env set OTEL_SERVICE_NAME "$otel_service_name"
          azd env set OTEL_SERVICE_NAMESPACE "$otel_service_namespace"
          azd env set OTEL_RECORD_CONTENT "$otel_record_content"
          azd env set APPLICATIONINSIGHTS_CONNECTION_STRING "$appinsights_connection_string"
          azd env set APPINSIGHTS_CONNECTION_STRING "$appinsights_connection_string"
          azd env set OTEL_EXPORTER_OTLP_TRACES_ENDPOINT "$otlp_traces_endpoint"

          runtime_env_payload="$(printf '%s\n' \
            "APP_ENV=$app_env" \
            "STORE_PROVIDER=postgres" \
            "MEMORY_PROVIDER=postgres" \
            "RAG_PROVIDER=pgvector" \
            "ENABLE_TELEMETRY=$enable_telemetry" \
            "ENABLE_INSTRUMENTATION=$enable_instrumentation" \
            "OTEL_SERVICE_NAME=$otel_service_name" \
            "OTEL_SERVICE_NAMESPACE=$otel_service_namespace" \
            "OTEL_RECORD_CONTENT=$otel_record_content" \
            "APPLICATIONINSIGHTS_CONNECTION_STRING=$appinsights_connection_string" \
            "APPINSIGHTS_CONNECTION_STRING=$appinsights_connection_string" \
            "OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=$otlp_traces_endpoint")"
          azd env set FOUNDRY_RUNTIME_ENV "$runtime_env_payload"

      - name: Private runner path preflight
        if: ${{ (inputs.deployment_profile || github.event.inputs.deployment_profile || 'private') == 'private' }}
        run: |
          set -euo pipefail
          cd infra/foundry-hosted

          resource_group="$(azd env get-value AZURE_RESOURCE_GROUP)"
          project_endpoint="$(azd env get-value FOUNDRY_PROJECTS_ENDPOINT)"
          account_name="$(echo "$project_endpoint" | sed -E 's#https://([^.]+)\..*#\1#')"
          endpoint_host="$(echo "$project_endpoint" | sed -E 's#https?://([^/]+)/?.*#\1#')"

          if [[ -z "$resource_group" || -z "$endpoint_host" || -z "$account_name" ]]; then
            echo "Missing private context for runner preflight."
            exit 1
          fi

          principal_id="$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)"
          account_id="$(az cognitiveservices account show -g "$resource_group" -n "$account_name" --query id -o tsv)"
          rg_scope="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${resource_group}"
          account_scope="${account_id}"

          injection_count="$(az cognitiveservices account show -g "$resource_group" -n "$account_name" --query "length(properties.networkInjections)" -o tsv)"
          if [[ "$injection_count" == "0" ]]; then
            echo "Foundry account '$account_name' has no networkInjections. Private agents data-plane admission will fail."
            echo "Reprovision into a fresh injected account (creation-time networkInjections) before deploy."
            exit 1
          fi

          foundry_user_count="$(az role assignment list --assignee-object-id "$principal_id" --scope "$account_scope" --query "length([?roleDefinitionName=='Foundry User'])" -o tsv)"
          contributor_or_owner_count="$(az role assignment list --assignee-object-id "$principal_id" --scope "$rg_scope" --include-inherited --query "length([?roleDefinitionName=='Contributor' || roleDefinitionName=='Owner'])" -o tsv)"
          if [[ "$foundry_user_count" == "0" && "$contributor_or_owner_count" == "0" ]]; then
            echo "Missing account data-plane authorization. Expected Foundry User on $account_scope or Contributor/Owner on $rg_scope."
            exit 1
          fi

          private_endpoint_state="$(az network private-endpoint-connection list --id "$account_id" --query "[?properties.privateLinkServiceConnectionState.status!='Approved'] | length(@)" -o tsv)"
          if [[ "$private_endpoint_state" != "0" ]]; then
            echo "Foundry private endpoint connection is not approved."
            exit 1
          fi

          echo "http_proxy=${http_proxy:-}"
          echo "https_proxy=${https_proxy:-}"
          echo "no_proxy=${no_proxy:-}"
          echo "HTTP_PROXY=${HTTP_PROXY:-}"
          echo "HTTPS_PROXY=${HTTPS_PROXY:-}"
          echo "NO_PROXY=${NO_PROXY:-}"
          getent hosts "$endpoint_host" || true

          token="$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv)"
          status="$(curl -sS --noproxy '*' -o /tmp/foundry_private_preflight.json -w '%{http_code}' \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/json" \
            "${project_endpoint}/agents?api-version=v1")"
          if [[ "$status" != "200" ]]; then
            echo "Private endpoint preflight call failed with HTTP $status"
            cat /tmp/foundry_private_preflight.json
            exit 1
          fi

          no_proxy_entries="${endpoint_host},.services.ai.azure.com,localhost,127.0.0.1"
          if [[ -n "${NO_PROXY:-}" ]]; then
            no_proxy_entries="${NO_PROXY},${no_proxy_entries}"
          fi
          echo "NO_PROXY=${no_proxy_entries}" >> "$GITHUB_ENV"
          echo "no_proxy=${no_proxy_entries}" >> "$GITHUB_ENV"

          azd ai project show --output json --no-prompt > /tmp/foundry_project_show.json || true
          azd ai agent doctor order-resolution-hosted --no-prompt || true

      - name: Deploy hosted agent
        run: make foundry-deploy

      - name: Smoke validation
        id: smoke_validation
        if: ${{ (inputs.run_smoke || github.event.inputs.run_smoke || 'true') == 'true' }}
        run: |
          set -euo pipefail
          smoke_retry_count="${FOUNDRY_SMOKE_RETRY_COUNT:-4}"
          smoke_retry_delay="${FOUNDRY_SMOKE_RETRY_DELAY_SECONDS:-20}"

          run_smoke_with_retry() {
            local smoke_message="$1"
            local attempt=1
            local output_file
            output_file="$(mktemp)"
            while true; do
              echo "Running smoke attempt ${attempt}/${smoke_retry_count}: ${smoke_message}"
              if make foundry-smoke SMOKE_MESSAGE="$smoke_message" 2>&1 | tee "$output_file"; then
                rm -f "$output_file"
                return 0
              fi

              if ! grep -Eq "session_not_ready|context deadline exceeded|failed to create conversation|timed out" "$output_file"; then
                echo "Smoke failed with non-retryable error."
                rm -f "$output_file"
                return 1
              fi

              if [[ "$attempt" -ge "$smoke_retry_count" ]]; then
                echo "Smoke failed after ${smoke_retry_count} attempts due to retryable agent session/conversation timeout errors."
                rm -f "$output_file"
                return 1
              fi

              echo "Smoke returned a retryable session/conversation timeout error; retrying in ${smoke_retry_delay}s."
              attempt=$((attempt + 1))
              sleep "$smoke_retry_delay"
            done
          }

          run_smoke_with_retry "Resolve delayed order ORD-1001"
          run_smoke_with_retry "Resolve delayed order ORD-1009"

      - name: Collect hosted agent diagnostics on smoke failure
        if: ${{ always() && steps.smoke_validation.outcome == 'failure' }}
        run: |
          set -euo pipefail
          cd infra/foundry-hosted
          azd ai agent show order-resolution-hosted --output json --no-prompt || true
          azd ai agent monitor order-resolution-hosted --type system --tail 200 --utc --no-prompt || true
          azd ai agent monitor order-resolution-hosted --tail 200 --utc --no-prompt || true

      - name: Hosted E2E validation
        if: ${{ (inputs.run_e2e || github.event.inputs.run_e2e || 'false') == 'true' }}
        run: ./scripts/github/foundry_hosted_e2e.sh

      - name: Collect hosted runtime logs
        if: ${{ always() }}
        run: |
          set -euo pipefail
          cd infra/foundry-hosted
          azd ai agent monitor order-resolution-hosted --type system --tail 200 --utc --no-prompt || true
          azd ai agent monitor order-resolution-hosted --tail 200 --utc --no-prompt || true
