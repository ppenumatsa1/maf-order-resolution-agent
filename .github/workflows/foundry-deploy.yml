name: Foundry Deploy

on:
    workflow_dispatch:
        inputs:
            runner_label:
                description: Self-hosted runner label for private Foundry access
                required: false
                default: foundry-private
            environment:
                description: GitHub environment name
                required: false
                default: foundry-private-env
            run_smoke:
                description: Run Foundry smoke invoke after deploy
                required: false
                default: "true"
            run_telemetry_gate:
                description: Validate fresh App Insights telemetry after deploy
                required: false
                default: "true"
            run_e2e:
                description: Run Foundry hosted E2E suite
                required: false
                default: "true"
            probe_only:
                description: Run runner-side hosted responses curl probe only
                required: false
                default: "false"
            probe_message:
                description: Probe message sent to hosted responses endpoint
                required: false
                default: Resolve delayed order ORD-1001
            probe_agent_name:
                description: Hosted agent name for probe calls
                required: false
                default: order-resolution-hosted
            probe_responses_url_override:
                description: Optional full probe responses endpoint URL override
                required: false
                default: ""
    workflow_call:
        inputs:
            runner_label:
                required: false
                type: string
                default: foundry-private
            environment:
                required: false
                type: string
                default: foundry-private-env
            run_smoke:
                required: false
                type: string
                default: "true"
            run_telemetry_gate:
                required: false
                type: string
                default: "true"
            run_e2e:
                required: false
                type: string
                default: "true"
            probe_only:
                required: false
                type: string
                default: "false"
            probe_message:
                required: false
                type: string
                default: Resolve delayed order ORD-1001
            probe_agent_name:
                required: false
                type: string
                default: order-resolution-hosted
            probe_responses_url_override:
                required: false
                type: string
                default: ""

permissions:
    id-token: write
    contents: read

jobs:
    runner_probe:
        name: Runner-side hosted responses probe
        if: ${{ (inputs.probe_only || github.event.inputs.probe_only || 'false') == 'true' }}
        runs-on:
            - self-hosted
            - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
        environment: ${{ inputs.environment || github.event.inputs.environment || 'foundry-private-env' }}
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v4

            - name: Configure writable CLI paths
              run: |
                  set -euo pipefail
                  cfg_root="${GITHUB_WORKSPACE}/.runner-config"
                  mkdir -p "${cfg_root}/.home" "${cfg_root}/.azure" "${cfg_root}/.azd" "${cfg_root}/.tmp"
                  echo "HOME=${cfg_root}/.home" >> "$GITHUB_ENV"
                  echo "AZURE_CONFIG_DIR=${cfg_root}/.azure" >> "$GITHUB_ENV"
                  echo "AZD_CONFIG_DIR=${cfg_root}/.azd" >> "$GITHUB_ENV"
                  echo "TMPDIR=${cfg_root}/.tmp" >> "$GITHUB_ENV"

            - name: Azure and AZD login
              env:
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
              run: |
                  set -euo pipefail
                  auth_mode="${{ vars.FOUNDRY_DEPLOY_AUTH_MODE || 'service-principal' }}"
                  if [[ "$auth_mode" == "service-principal" ]]; then
                    if [[ -z "${AZURE_CLIENT_SECRET:-}" ]]; then
                      echo "AZURE_CLIENT_SECRET is not set; using GitHub OIDC federated credential flow."
                      if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
                        echo "GitHub OIDC token env vars are missing; cannot authenticate."
                        exit 1
                      fi
                      oidc_auth_header="$(printf 'Authorization: bearer %s' "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}")"
                      federated_token="$(curl -fsSL -H "$oidc_auth_header" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')"
                      if [[ -z "$federated_token" || "$federated_token" == "null" ]]; then
                        echo "Failed to acquire GitHub OIDC federated token."
                        exit 1
                      fi
                      az login --service-principal \
                        --username "${{ vars.AZURE_CLIENT_ID }}" \
                        --tenant "${{ vars.AZURE_TENANT_ID }}" \
                        --federated-token "$federated_token"
                      if command -v azd >/dev/null 2>&1; then
                        azd auth login \
                          --federated-credential-provider github \
                          --client-id "${{ vars.AZURE_CLIENT_ID }}" \
                          --tenant-id "${{ vars.AZURE_TENANT_ID }}" \
                          --no-prompt
                      fi
                    else
                      az login --service-principal \
                        --username "${{ vars.AZURE_CLIENT_ID }}" \
                        --password "$AZURE_CLIENT_SECRET" \
                        --tenant "${{ vars.AZURE_TENANT_ID }}"
                      if command -v azd >/dev/null 2>&1; then
                        azd auth login \
                          --client-id "${{ vars.AZURE_CLIENT_ID }}" \
                          --client-secret "$AZURE_CLIENT_SECRET" \
                          --tenant-id "${{ vars.AZURE_TENANT_ID }}" \
                          --no-prompt
                      fi
                    fi
                  else
                    az login --identity --client-id "${{ vars.AZURE_CLIENT_ID }}"
                    if command -v azd >/dev/null 2>&1; then
                      azd auth login --managed-identity --client-id "${{ vars.AZURE_CLIENT_ID }}" --tenant-id "${{ vars.AZURE_TENANT_ID }}" --no-prompt
                    fi
                  fi
                  az account set -s "${{ vars.AZURE_SUBSCRIPTION_ID }}"

            - name: Optional agent status snapshot (azd)
              continue-on-error: true
              run: |
                  set -euo pipefail
                  if ! command -v azd >/dev/null 2>&1; then
                    echo "azd not installed on runner; skipping agent show."
                    exit 0
                  fi
                  if [[ ! -d infra/foundry-hosted ]]; then
                    echo "infra/foundry-hosted not found; skipping agent show."
                    exit 0
                  fi
                  status_json="$(cd infra/foundry-hosted && azd ai agent show "${{ inputs.probe_agent_name || github.event.inputs.probe_agent_name || 'order-resolution-hosted' }}" --output json --no-prompt 2>&1 || true)"
                  echo "$status_json"
                  status="$(printf '%s\n' "$status_json" | jq -R -s 'try (fromjson.status // empty) catch empty' | tr -d '"')"
                  version="$(printf '%s\n' "$status_json" | jq -R -s 'try (fromjson.version // fromjson.latestVersion // fromjson.resolvedVersion // empty) catch empty' | tr -d '"')"
                  echo "Agent status snapshot: status=${status:-unknown} version=${version:-unknown}"

            - name: Curl hosted responses endpoint
              run: |
                  set -euo pipefail
                  probe_dir="${GITHUB_WORKSPACE}/.probe"
                  mkdir -p "$probe_dir"
                  headers_file="${probe_dir}/headers.txt"
                  body_file="${probe_dir}/body.txt"
                  responses_url="${{ inputs.probe_responses_url_override || github.event.inputs.probe_responses_url_override || '' }}"
                  if [[ -z "$responses_url" ]]; then
                    project_endpoint="${{ vars.FOUNDRY_PROJECT_ENDPOINT }}"
                    if [[ -z "$project_endpoint" ]]; then
                      echo "FOUNDRY_PROJECT_ENDPOINT variable is required."
                      exit 1
                    fi
                    agent_name="${{ inputs.probe_agent_name || github.event.inputs.probe_agent_name || 'order-resolution-hosted' }}"
                    responses_url="${project_endpoint%/}/agents/${agent_name}/endpoint/protocols/openai/responses?api-version=v1"
                  fi
                  probe_message="${{ inputs.probe_message || github.event.inputs.probe_message || 'Resolve delayed order ORD-1001' }}"
                  token="$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv)"
                  payload="$(jq -n --arg input "$probe_message" '{input: $input}')"
                  http_code="$(curl -sS \
                    -X POST "$responses_url" \
                    --oauth2-bearer "$token" \
                    -H "Content-Type: application/json" \
                    -H "Accept: application/json" \
                    --data "$payload" \
                    -D "$headers_file" \
                    -o "$body_file" \
                    -w "%{http_code}")"
                  apim_request_id="$(awk -F': ' 'BEGIN{IGNORECASE=1} /^apim-request-id:/ {sub(/\r$/, "", $2); print $2; exit}' "$headers_file")"
                  sanitized_body="$(sed -E 's/[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}/[REDACTED_JWT]/g' "$body_file" | head -c 12000)"
                  echo "Responses endpoint URL: $responses_url"
                  echo "HTTP status code: $http_code"
                  echo "apim-request-id: ${apim_request_id:-<missing>}"
                  echo "----- response headers -----"
                  cat "$headers_file"
                  echo "----- response body (sanitized) -----"
                  printf '%s\n' "$sanitized_body"
                  {
                    echo "## Runner probe result"
                    echo "- URL: \`$responses_url\`"
                    echo "- HTTP: \`$http_code\`"
                    echo "- apim-request-id: \`${apim_request_id:-missing}\`"
                    echo ""
                    echo "### Body (sanitized, truncated)"
                    echo '```json'
                    printf '%s\n' "$sanitized_body"
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
                  if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
                    echo "::error::Probe failed with HTTP $http_code"
                    exit 1
                  fi

    deploy:
        name: Deploy Foundry Hosted Agent
        if: ${{ (inputs.probe_only || github.event.inputs.probe_only || 'false') != 'true' }}
        runs-on:
            - self-hosted
            - ${{ inputs.runner_label || github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
        environment: ${{ inputs.environment || github.event.inputs.environment || 'foundry-private-env' }}
        defaults:
            run:
                shell: bash
        steps:
            - name: Reset self-hosted workspace permissions
              run: |
                  set -euo pipefail
                  workspace="${GITHUB_WORKSPACE:?GITHUB_WORKSPACE is required}"
                  mkdir -p "$workspace"
                  if command -v sudo >/dev/null 2>&1; then
                    sudo chown -R "$(id -u):$(id -g)" "$workspace" || true
                  fi
                  chmod -R u+rwX "$workspace" || true
                  find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true

            - uses: actions/checkout@v4

            - name: Stage hosted agent project from backend
              run: |
                  set -euo pipefail
                  rm -rf infra/foundry-hosted/agent
                  mkdir -p infra/foundry-hosted/agent
                  cp -a backend/. infra/foundry-hosted/agent/
                  rm -rf infra/foundry-hosted/agent/.venv infra/foundry-hosted/agent/tests

            - name: Azure and AZD login
              env:
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
              run: |
                  set -euo pipefail
                  auth_mode="${{ vars.FOUNDRY_DEPLOY_AUTH_MODE || 'service-principal' }}"
                  cfg_root="${RUNNER_TEMP:-/tmp}/foundry-runner"
                  if mkdir -p /mnt/.azure /mnt/.azd 2>/dev/null; then
                    cfg_root="/mnt"
                  fi
                  mkdir -p "${cfg_root}/.azure" "${cfg_root}/.azd"
                  export AZURE_CONFIG_DIR="${cfg_root}/.azure"
                  export AZD_CONFIG_DIR="${cfg_root}/.azd"
                  if [[ "$auth_mode" == "service-principal" ]]; then
                    if [[ -z "${AZURE_CLIENT_SECRET:-}" ]]; then
                      echo "AZURE_CLIENT_SECRET is not set; using GitHub OIDC federated credential flow."
                      if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
                        echo "GitHub OIDC token env vars are missing; cannot authenticate."
                        exit 1
                      fi
                      federated_token="$(curl -fsSL -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')"
                      if [[ -z "$federated_token" || "$federated_token" == "null" ]]; then
                        echo "Failed to acquire GitHub OIDC federated token."
                        exit 1
                      fi
                      az login --service-principal \
                        --username "${{ vars.AZURE_CLIENT_ID }}" \
                        --tenant "${{ vars.AZURE_TENANT_ID }}" \
                        --federated-token "$federated_token"
                      azd auth login \
                        --federated-credential-provider github \
                        --client-id "${{ vars.AZURE_CLIENT_ID }}" \
                        --tenant-id "${{ vars.AZURE_TENANT_ID }}" \
                        --no-prompt
                    else
                      az login --service-principal \
                        --username "${{ vars.AZURE_CLIENT_ID }}" \
                        --password "$AZURE_CLIENT_SECRET" \
                        --tenant "${{ vars.AZURE_TENANT_ID }}"
                      azd auth login \
                        --client-id "${{ vars.AZURE_CLIENT_ID }}" \
                        --client-secret "$AZURE_CLIENT_SECRET" \
                        --tenant-id "${{ vars.AZURE_TENANT_ID }}" \
                        --no-prompt
                    fi
                  else
                    az login --identity --client-id "${{ vars.AZURE_CLIENT_ID }}"
                    azd auth login --managed-identity --client-id "${{ vars.AZURE_CLIENT_ID }}" --tenant-id "${{ vars.AZURE_TENANT_ID }}" --no-prompt
                  fi
                  az account set -s "${{ vars.AZURE_SUBSCRIPTION_ID }}"

            - name: Configure writable azd paths on data disk
              run: |
                  set -euo pipefail
                  cfg_root="${RUNNER_TEMP:-/tmp}/foundry-runner"
                  if mkdir -p /mnt/.home /mnt/.azd /mnt/.tmp /mnt/.azure 2>/dev/null; then
                    cfg_root="/mnt"
                  fi
                  mkdir -p "${cfg_root}/.home" "${cfg_root}/.azd" "${cfg_root}/.tmp" "${cfg_root}/.azure"
                  echo "HOME=${cfg_root}/.home" >> "$GITHUB_ENV"
                  echo "AZD_CONFIG_DIR=${cfg_root}/.azd" >> "$GITHUB_ENV"
                  echo "TMPDIR=${cfg_root}/.tmp" >> "$GITHUB_ENV"
                  echo "AZURE_CONFIG_DIR=${cfg_root}/.azure" >> "$GITHUB_ENV"

            - name: Verify azd availability
              run: azd version

            - name: Install required azd extension
              run: |
                  set -euo pipefail
                  installed_version="$(azd extension show azure.ai.agents | awk -F': ' '/Installed Version/{print $2}' | tr -d '\r')"
                  if [[ -n "$installed_version" && "$installed_version" != "N/A" ]]; then
                    azd extension upgrade azure.ai.agents --no-prompt || true
                  else
                    azd extension install azure.ai.agents --no-prompt
                  fi

            - name: Prepare runtime env file for Foundry
              env:
                  FOUNDRY_DATABASE_URL: ${{ secrets.FOUNDRY_DATABASE_URL }}
              run: |
                  set -euo pipefail
                  mkdir -p infra/foundry-hosted/runtime
                  printf '%s\n' "${{ secrets.FOUNDRY_RUNTIME_ENV }}" > infra/foundry-hosted/runtime/.env
                  if [[ -n "${FOUNDRY_DATABASE_URL:-}" ]]; then
                    echo "FOUNDRY_DATABASE_URL secret detected for deploy runtime env."
                  else
                    echo "FOUNDRY_DATABASE_URL secret is not set in this environment."
                  fi
                  if [[ -n "${FOUNDRY_DATABASE_URL:-}" ]]; then
                    if grep -q '^DATABASE_URL=' infra/foundry-hosted/runtime/.env; then
                      awk -v value="$FOUNDRY_DATABASE_URL" '
                        BEGIN { updated = 0 }
                        /^DATABASE_URL=/ {
                          print "DATABASE_URL=" value
                          updated = 1
                          next
                        }
                        { print }
                        END {
                          if (updated == 0) {
                            print "DATABASE_URL=" value
                          }
                        }
                      ' infra/foundry-hosted/runtime/.env > infra/foundry-hosted/runtime/.env.tmp
                      mv infra/foundry-hosted/runtime/.env.tmp infra/foundry-hosted/runtime/.env
                    else
                      printf 'DATABASE_URL=%s\n' "${FOUNDRY_DATABASE_URL}" >> infra/foundry-hosted/runtime/.env
                    fi
                  fi
                  test -s infra/foundry-hosted/runtime/.env

            - name: Select or create azd environment
              run: |
                  set -euo pipefail
                  cd infra/foundry-hosted
                  azd env select "${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}" || azd env new "${{ vars.FOUNDRY_AZD_ENV_NAME || 'foundry-private-env' }}"
                  azd env set AZURE_SUBSCRIPTION_ID "${{ vars.AZURE_SUBSCRIPTION_ID }}"
                  azd env set AZURE_RESOURCE_GROUP "${{ vars.FOUNDRY_RESOURCE_GROUP }}"
                  azd env set AZURE_LOCATION "${{ vars.FOUNDRY_LOCATION || 'eastus2' }}"
                  azd env set AZURE_AI_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID }}"
                  azd env set FOUNDRY_PROJECT_ID "${{ vars.FOUNDRY_PROJECT_ID }}"
                  azd env set FOUNDRY_PROJECT_ENDPOINT "${{ vars.FOUNDRY_PROJECT_ENDPOINT }}"

            - name: Sync env into azd and runtime mirrors
              run: make foundry-sync-env

            - name: Refresh staged hosted runtime env
              run: |
                  set -euo pipefail
                  mkdir -p infra/foundry-hosted/agent/runtime
                  cp infra/foundry-hosted/runtime/.env infra/foundry-hosted/agent/runtime/.env

            - name: Verify staged runtime DATABASE_URL
              run: |
                  set -euo pipefail
                  src_line="$(grep -E '^DATABASE_URL=' infra/foundry-hosted/runtime/.env || true)"
                  staged_line="$(grep -E '^DATABASE_URL=' infra/foundry-hosted/agent/runtime/.env || true)"
                  if [[ -z "$src_line" || -z "$staged_line" ]]; then
                    echo "DATABASE_URL is missing from runtime env files."
                    exit 1
                  fi
                  src_host="$(DB_LINE="$src_line" python -c 'import os, urllib.parse; line = os.environ["DB_LINE"]; value = line.split("=", 1)[1]; print(urllib.parse.urlparse(value).hostname or "")')"
                  staged_host="$(DB_LINE="$staged_line" python -c 'import os, urllib.parse; line = os.environ["DB_LINE"]; value = line.split("=", 1)[1]; print(urllib.parse.urlparse(value).hostname or "")')"
                  echo "Runtime DATABASE_URL host: ${src_host:-missing}"
                  echo "Staged DATABASE_URL host: ${staged_host:-missing}"
                  if [[ "$src_host" != "$staged_host" ]]; then
                    echo "Staged runtime DATABASE_URL host does not match source runtime env."
                    exit 1
                  fi

            - name: Deploy Foundry hosted agent
              run: |
                  set -euo pipefail
                  timeout_seconds="${FOUNDRY_DEPLOY_TIMEOUT_SECONDS:-1800}"
                  max_attempts="${FOUNDRY_DEPLOY_MAX_ATTEMPTS:-3}"
                  for attempt in $(seq 1 "$max_attempts"); do
                    echo "Deploy attempt $attempt/$max_attempts (timeout=${timeout_seconds}s)"
                    set +e
                    deploy_output="$(FOUNDRY_DEPLOY_TIMEOUT_SECONDS="$timeout_seconds" make foundry-deploy 2>&1)"
                    rc=$?
                    set -e
                    printf '%s\n' "$deploy_output"
                    if [[ $rc -eq 0 ]]; then
                      exit 0
                    fi
                    if echo "$deploy_output" | grep -Eq 'agent deployment timed out \(last status: creating\)'; then
                      echo "Deploy timed out waiting for agent activation; checking current agent status before retry."
                      for status_attempt in $(seq 1 20); do
                        set +e
                        status_json="$(cd infra/foundry-hosted && azd ai agent show order-resolution-hosted --output json --no-prompt)"
                        status_rc=$?
                        set -e
                        status="$(printf '%s\n' "$status_json" | jq -R -s 'try (fromjson.status // empty) catch empty' | tr -d '"' | tr '[:upper:]' '[:lower:]')"
                        echo "agent_status=${status:-unknown} (check $status_attempt/20)"
                        if [[ -n "$status_json" ]] && [[ "$status" =~ ^(failed|error)$ ]]; then
                          echo "agent_status_detail=$status_json"
                        fi
                        if [[ $status_rc -eq 0 ]] && [[ "$status" =~ ^(active|ready|succeeded)$ ]]; then
                          echo "Agent reported active after timeout; proceeding."
                          exit 0
                        fi
                        sleep 15
                      done
                      if [[ "$attempt" -lt "$max_attempts" ]]; then
                        echo "Retrying deploy after timeout."
                        sleep 30
                        continue
                      fi
                    fi
                    echo "Deploy failed with a non-retriable error."
                    exit "$rc"
                  done
                  echo "Deploy failed after retries."
                  exit 1

            - name: Wait for hosted agent status active
              if: ${{ (inputs.run_smoke || github.event.inputs.run_smoke || 'true') == 'true' }}
              run: |
                  set -euo pipefail
                  max_checks="${FOUNDRY_AGENT_ACTIVE_MAX_CHECKS:-40}"
                  retry_delay_seconds="${FOUNDRY_AGENT_ACTIVE_RETRY_DELAY_SECONDS:-15}"
                  for check in $(seq 1 "$max_checks"); do
                    status_json="$(cd infra/foundry-hosted && azd ai agent show order-resolution-hosted --output json --no-prompt || true)"
                    status="$(printf '%s\n' "$status_json" | jq -R -s 'try (fromjson.status // empty) catch empty' | tr -d '"' | tr '[:upper:]' '[:lower:]')"
                    version="$(printf '%s\n' "$status_json" | jq -R -s 'try (fromjson.version // fromjson.latestVersion // empty) catch empty' | tr -d '"')"
                    echo "Agent readiness check $check/$max_checks status=${status:-unknown} version=${version:-unknown}"
                    if [[ "$status" =~ ^(active|ready|succeeded)$ ]]; then
                      echo "Hosted agent is active."
                      exit 0
                    fi
                    if [[ "$status" =~ ^(failed|error)$ ]]; then
                      echo "Hosted agent entered terminal failure state."
                      echo "agent_status_detail=$status_json"
                      exit 1
                    fi
                    sleep "$retry_delay_seconds"
                  done
                  echo "Hosted agent did not reach active/ready status in time."
                  exit 1

            - name: Smoke test Foundry hosted agent invoke
              if: ${{ (inputs.run_smoke || github.event.inputs.run_smoke || 'true') == 'true' }}
              run: |
                  set -euo pipefail
                  MESSAGE="ORD-1009 delayed order telemetry gate"
                  raw=""
                  rc=1
                  max_attempts="${FOUNDRY_SMOKE_MAX_ATTEMPTS:-60}"
                  retry_delay_seconds="${FOUNDRY_SMOKE_RETRY_DELAY_SECONDS:-15}"
                  endpoint_refresh_after_attempt="${FOUNDRY_SMOKE_ENDPOINT_REFRESH_AFTER_ATTEMPT:-5}"
                  if (( endpoint_refresh_after_attempt >= max_attempts )); then
                    endpoint_refresh_after_attempt=$((max_attempts - 1))
                  fi
                  if (( endpoint_refresh_after_attempt < 1 )); then
                    endpoint_refresh_after_attempt=1
                  fi
                  endpoint_refreshed="false"
                  for attempt in $(seq 1 "$max_attempts"); do
                    set +e
                    raw="$(cd infra/foundry-hosted && azd ai agent invoke order-resolution-hosted "$MESSAGE" --protocol responses --output raw --no-prompt 2>&1)"
                    rc=$?
                    set -e
                    if [[ $rc -eq 0 ]]; then
                      break
                    fi
                    if echo "$raw" | grep -Eqi 'HTTP (404|409|429|5[0-9]{2})'; then
                      echo "Smoke invoke transient failure (attempt $attempt/$max_attempts). Retrying..."
                      if (( attempt % 5 == 0 )); then
                        status_json="$(cd infra/foundry-hosted && azd ai agent show order-resolution-hosted --output json --no-prompt 2>/dev/null || true)"
                        status_summary="$(printf '%s\n' "$status_json" | jq -R -s 'try (fromjson | {status: (.status // "unknown"), version: (.version // .latestVersion // .resolvedVersion // empty)}) catch {"status":"unknown"}')"
                        echo "Agent status snapshot: $status_summary"
                      fi
                      if [[ "$endpoint_refreshed" == "false" ]] && (( attempt >= endpoint_refresh_after_attempt )) && (( attempt < max_attempts )); then
                        echo "Refreshing agent endpoint configuration after sustained transient responses errors."
                        set +e
                        (cd infra/foundry-hosted && azd ai agent endpoint update order-resolution-hosted --no-prompt)
                        set -e
                        endpoint_refreshed="true"
                      fi
                      sleep "$retry_delay_seconds"
                      continue
                    fi
                    echo "Smoke invoke failed (rc=$rc)."
                    echo "$raw"
                    if echo "$raw" | grep -Eqi 'session_not_ready|424 Failed Dependency'; then
                      echo "Collecting hosted agent monitor logs for readiness failure diagnostics..."
                      set +e
                      (cd infra/foundry-hosted && timeout 90 azd ai agent monitor --follow --no-prompt)
                      set -e
                    fi
                    exit $rc
                  done
                  if [[ $rc -ne 0 ]]; then
                    echo "Smoke invoke failed after retries."
                    echo "$raw"
                    if echo "$raw" | grep -Eqi 'session_not_ready|424 Failed Dependency'; then
                      echo "Collecting hosted agent monitor logs after retries exhausted..."
                      set +e
                      (cd infra/foundry-hosted && timeout 90 azd ai agent monitor --follow --no-prompt)
                      set -e
                    fi
                    exit $rc
                  fi
                  payload="$(printf '%s\n' "$raw" | awk '
                    found { print; next }
                    /^\{/ {
                      found = 1
                      print
                    }
                  ')"
                  THREAD_ID="$(echo "$payload" | jq -r '[.. | objects | (.thread_id? // .conversation_id? // empty)] | map(select(type=="string" and length>0)) | .[0] // empty')"
                  if [[ -z "$THREAD_ID" ]]; then
                    echo "Could not determine smoke thread_id from responses output."
                    echo "$raw"
                    exit 1
                  fi
                  echo "FOUNDRY_SMOKE_THREAD_ID=$THREAD_ID" >> "$GITHUB_ENV"
                  echo "FOUNDRY_SMOKE_MESSAGE=$MESSAGE" >> "$GITHUB_ENV"
                  echo "Responses smoke thread id: $THREAD_ID"

            - name: Foundry hosted E2E regression
              if: ${{ (inputs.run_e2e || github.event.inputs.run_e2e || 'true') == 'true' }}
              run: |
                  set -euo pipefail
                  chmod +x scripts/github/foundry_hosted_e2e.sh
                  scripts/github/foundry_hosted_e2e.sh "foundry-e2e-${{ github.run_id }}-${{ github.run_attempt }}"

            - name: Telemetry gate (App Insights)
              if: ${{ (inputs.run_telemetry_gate || github.event.inputs.run_telemetry_gate || 'true') == 'true' && (inputs.run_smoke || github.event.inputs.run_smoke || 'true') == 'true' }}
              run: |
                  set -euo pipefail
                  APP_ID="${{ vars.APPINSIGHTS_APP_ID }}"
                  if [[ -z "$APP_ID" ]]; then
                    echo "APPINSIGHTS_APP_ID variable is required for telemetry gate"
                    exit 1
                  fi
                  THREAD_ID="${FOUNDRY_SMOKE_THREAD_ID:-}"
                  if [[ -z "$THREAD_ID" ]]; then
                    echo "FOUNDRY_SMOKE_THREAD_ID is missing; telemetry gate requires correlated smoke execution"
                    exit 1
                  fi

                  # Wait up to 10 minutes for ingestion after deploy+invoke
                  for i in $(seq 1 20); do
                    telemetry_query="union traces,requests,dependencies,exceptions | where timestamp > ago(20m) | extend workflowThreadId = tostring(customDimensions['workflow.thread_id']) | where workflowThreadId == '${THREAD_ID}' | summarize count()"
                    COUNT=$(az monitor app-insights query --app "$APP_ID" \
                      --analytics-query "$telemetry_query" \
                      --query "tables[0].rows[0][0]" -o tsv)
                    COUNT=${COUNT:-0}
                    echo "telemetry_count=$COUNT thread_id=$THREAD_ID (attempt $i/20)"
                    if [[ "$COUNT" =~ ^[0-9]+$ ]] && [[ "$COUNT" -gt 0 ]]; then
                      echo "Telemetry gate passed"
                      exit 0
                    fi
                    sleep 30
                  done

                  echo "Telemetry gate failed: no correlated App Insights data for thread_id=$THREAD_ID"
                  exit 1
