name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  routing:
    name: Operating model routing
    runs-on: ubuntu-latest
    outputs:
      validation_mode: ${{ steps.route.outputs.validation_mode }}
      deploy_mode: ${{ steps.route.outputs.deploy_mode }}
      router_reason: ${{ steps.route.outputs.router_reason }}
      base_ref: ${{ steps.base.outputs.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve diff base
        id: base
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          elif [[ -n "${{ github.event.before || '' }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_ref="${{ github.event.before }}"
          else
            base_ref="HEAD~1"
          fi
          echo "base_ref=$base_ref" >> "$GITHUB_OUTPUT"
      - name: Route validation/deploy mode
        id: route
        run: |
          set -euo pipefail
          routing_output="$(scripts/skills/deployment-mode-router.sh "${{ steps.base.outputs.base_ref }}")"
          echo "$routing_output"
          validation_mode="$(grep '^validation_mode=' <<<"$routing_output" | head -n1 | cut -d= -f2)"
          deploy_mode="$(grep '^deploy_mode=' <<<"$routing_output" | head -n1 | cut -d= -f2)"
          router_reason="$(grep '^reason=' <<<"$routing_output" | head -n1 | cut -d= -f2)"
          echo "validation_mode=$validation_mode" >> "$GITHUB_OUTPUT"
          echo "deploy_mode=$deploy_mode" >> "$GITHUB_OUTPUT"
          echo "router_reason=$router_reason" >> "$GITHUB_OUTPUT"

  operating-model-enforcement:
    name: Operating model enforcement
    runs-on: ubuntu-latest
    needs: routing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce operating model guardrails
        run: scripts/skills/operating-model-enforcement.sh "${{ needs.routing.outputs.base_ref }}"

  backend:
    name: Backend lint, tests, and evals
    runs-on: ubuntu-latest
    needs:
      - routing
      - operating-model-enforcement
    if: ${{ needs.routing.outputs.validation_mode == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          cd backend
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt
      - name: Run backend lint and tests
        run: make test
      - name: Run backend evals
        run: make eval-backend

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs:
      - routing
      - operating-model-enforcement
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend

  e2e:
    name: Docker E2E
    runs-on: ubuntu-latest
    needs:
      - routing
      - operating-model-enforcement
    if: ${{ needs.routing.outputs.validation_mode == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/playwright/package-lock.json
      - name: Run Docker E2E profile
        run: make docker-test

  design-review:
    name: Deterministic design-review gate
    runs-on: ubuntu-latest
    needs:
      - routing
      - operating-model-enforcement
    if: ${{ needs.routing.outputs.validation_mode == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run design-review gate
        run: ./scripts/skills/design-review-skill.sh

  quick-validation:
    name: Quick validation gate
    runs-on: ubuntu-latest
    needs:
      - routing
      - operating-model-enforcement
    if: ${{ needs.routing.outputs.validation_mode == 'quick' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run quick validation
        run: make validate-quick
