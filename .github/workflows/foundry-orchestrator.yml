name: Foundry Orchestrator

on:
  push:
    branches:
      - feature/foundry-private-network-vnet
    paths:
      - .github/workflows/foundry-orchestrator.yml
      - .github/workflows/foundry-provision.yml
      - .github/workflows/foundry-deploy.yml
      - scripts/github/bootstrap_foundry_github_config.sh
      - scripts/github/register_vm_runner.sh
      - scripts/github/bootstrap_vm_runner_host.sh
      - scripts/github/verify_foundry_runner_ready.sh
      - scripts/github/foundry_hosted_e2e.sh
      - Makefile
      - backend/agent.yaml
      - backend/foundry/main.py
      - backend/requirements.txt
      - infra/foundry-hosted/azure.yaml
      - infra/foundry-hosted/iac/**
      - infra/foundry-hosted/runtime/**
      - infra/foundry-hosted/README.md
  workflow_dispatch:
    inputs:
      runner_label:
        description: Self-hosted runner label
        required: false
        default: foundry-private
      environment:
        description: GitHub environment
        required: false
        default: foundry-private-env
      run_provision:
        description: Run infrastructure provision pipeline
        required: false
        default: "true"
      run_deploy:
        description: Run code deploy pipeline
        required: false
        default: "true"
      run_smoke:
        description: Run smoke invoke in deploy pipeline
        required: false
        default: "true"
      run_telemetry_gate:
        description: Run telemetry gate in deploy pipeline
        required: false
        default: "true"
      run_e2e:
        description: Run Foundry hosted E2E suite in deploy pipeline
        required: false
        default: "true"

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  runner_preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify self-hosted runner availability
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUNNER_LABEL: ${{ github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
          RUNNER_PREFLIGHT_ALLOW_403: "true"
        run: |
          set -euo pipefail
          chmod +x scripts/github/verify_foundry_runner_ready.sh
          scripts/github/verify_foundry_runner_ready.sh

  provision:
    if: ${{ github.event_name == 'push' || github.event.inputs.run_provision == 'true' }}
    needs: [runner_preflight]
    uses: ./.github/workflows/foundry-provision.yml
    with:
      runner_label: ${{ github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
      environment: ${{ github.event.inputs.environment || 'foundry-private-env' }}
    secrets: inherit

  deploy_after_provision:
    if: ${{ github.event_name == 'push' || (github.event.inputs.run_deploy == 'true' && github.event.inputs.run_provision == 'true') }}
    needs: [provision]
    uses: ./.github/workflows/foundry-deploy.yml
    with:
      runner_label: ${{ github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
      environment: ${{ github.event.inputs.environment || 'foundry-private-env' }}
      run_smoke: ${{ github.event.inputs.run_smoke || 'true' }}
      run_telemetry_gate: ${{ github.event.inputs.run_telemetry_gate || 'true' }}
      run_e2e: ${{ github.event.inputs.run_e2e || 'true' }}
    secrets: inherit

  deploy_only:
    if: ${{ github.event.inputs.run_deploy == 'true' && github.event.inputs.run_provision != 'true' }}
    needs: [runner_preflight]
    uses: ./.github/workflows/foundry-deploy.yml
    with:
      runner_label: ${{ github.event.inputs.runner_label || vars.RUNNER_LABEL || 'foundry-private' }}
      environment: ${{ github.event.inputs.environment || 'foundry-private-env' }}
      run_smoke: ${{ github.event.inputs.run_smoke || 'true' }}
      run_telemetry_gate: ${{ github.event.inputs.run_telemetry_gate || 'true' }}
      run_e2e: ${{ github.event.inputs.run_e2e || 'true' }}
    secrets: inherit